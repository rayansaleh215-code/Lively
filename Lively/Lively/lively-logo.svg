<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" style="stop-color:#0F1A3D"/>
      <stop offset="55%" style="stop-color:#060A1A"/>
      <stop offset="100%" style="stop-color:#020308"/>
    </radialGradient>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7DD3FC"/>
      <stop offset="25%" style="stop-color:#A78BFA"/>
      <stop offset="55%" style="stop-color:#86EFAC"/>
      <stop offset="80%" style="stop-color:#FDE68A"/>
      <stop offset="100%" style="stop-color:#F9A8D4"/>
    </linearGradient>
    <linearGradient id="rainbow2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F9A8D4"/>
      <stop offset="25%" style="stop-color:#FDE68A"/>
      <stop offset="55%" style="stop-color:#86EFAC"/>
      <stop offset="80%" style="stop-color:#7DD3FC"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)" rx="32"/>

  <!-- Stars -->
  <circle cx="60" cy="50" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="150" cy="30" r="1" fill="#BFD4FF" opacity="0.6"/>
  <circle cx="400" cy="45" r="1.5" fill="#fff" opacity="0.8"/>
  <circle cx="460" cy="90" r="1" fill="#BFD4FF" opacity="0.5"/>
  <circle cx="30" cy="140" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="480" cy="200" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="90" cy="420" r="1" fill="#BFD4FF" opacity="0.5"/>
  <circle cx="430" cy="390" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="200" cy="470" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="350" cy="460" r="1.5" fill="#BFD4FF" opacity="0.7"/>
  <circle cx="470" cy="460" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="20" cy="300" r="1.5" fill="#7DD3FC" opacity="0.6"/>
  <circle cx="490" cy="320" r="1" fill="#A78BFA" opacity="0.7"/>

  <!-- Letter L -->
  <rect x="105" y="100" width="62" height="240" rx="16" fill="url(#rainbow)" filter="url(#glow)"/>
  <rect x="105" y="278" width="190" height="62" rx="16" fill="url(#rainbow)" filter="url(#glow)"/>

  <!-- Four-pointed star -->
  <path d="
    M370,220
    C370,220 386,168 395,110
    C404,168 420,220 420,220
    C420,220 472,204 500,220
    C472,236 420,220 420,220
    C420,220 404,272 395,330
    C386,272 370,220 370,220
    C370,220 318,236 290,220
    C318,204 370,220 370,220
    Z
  " fill="url(#rainbow2)" filter="url(#glow)"/>

  <!-- Glow rings around star -->
  <circle cx="395" cy="220" r="72" fill="none" stroke="url(#rainbow2)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="395" cy="220" r="90" fill="none" stroke="url(#rainbow)" stroke-width="1" opacity="0.15"/>
</svg>
